<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Defacta — New Screen</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <!-- ── Copy this file to start a new screen. Compose from components only. ── -->

  <header class="site-header">
    <span class="brand">◆ Defacta</span>
    <nav>
      <a href="#">Docs</a>
      <a href="#">Sign in</a>
    </nav>
  </header>

  <main class="section">
    <div class="container content stack">
      <span class="label">Section label</span>
      <h1 class="display">Your headline here</h1>
      <p class="body-lg text-secondary">
        A short supporting line. Replace this with your screen's content,
        composing from <code>.card</code>, <code>.grid</code>, <code>.btn</code>, and the rest.
      </p>
      <div class="cluster" style="margin-top: var(--space-100)">
        <button class="btn btn--primary btn--lg">Primary action</button>
        <button class="btn btn--secondary btn--lg">Secondary</button>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <span>© Defacta</span>
    <span>·</span>
  </footer>
</body>
</html>
