<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Defacta — Verification Workbench</title>
  <link rel="stylesheet" href="../../styles.css">
  <style> body { background: var(--surface-paper); } </style>
</head>
<body>
  <!-- ── Centered phone-width column ─────────────────────────────────── -->
  <div style="max-width:420px; margin-inline:auto; min-height:100vh; display:flex; flex-direction:column">

    <!-- ── Mobile header ────────────────────────────────────────────── -->
    <header class="mobile-header">
      <a class="brand" href="landing.html"><img src="../../assets/defacta-logo.svg" alt="Defacta" class="brand__logo"></a>
      <button class="icon-btn" aria-label="Account"><i data-lucide="user"></i></button>
    </header>

    <!-- ── Workbench ────────────────────────────────────────────────── -->
    <main class="container" style="max-width:420px; padding-block: var(--space-300); flex:1">
      <!-- Heading -->
      <div style="margin-bottom: var(--space-300)">
        <span class="label" style="display:block; margin-bottom: var(--space-150)">Verification workbench</span>
        <h1 class="h3">What do you want to verify?</h1>
        <p class="body text-secondary" style="margin-top: var(--space-150)">Paste an article, an AI answer, or your own draft. Defacta reads it and shows you what holds up — and what doesn't.</p>
      </div>

      <!-- Analysis mode — stacked option-cards -->
      <p class="text-secondary" style="margin-bottom: var(--space-150)">Choose analysis mode</p>
      <div class="stack" style="margin-bottom: var(--space-300)">
        <label class="option-card">
          <input type="radio" name="mode" checked>
          <span class="option-card__title">Check my text</span>
          <span class="option-card__desc">Your own writing — Defacta returns inline editing suggestions and sourcing fixes.</span>
        </label>
        <label class="option-card">
          <input type="radio" name="mode">
          <span class="option-card__title">Check someone else's</span>
          <span class="option-card__desc">Someone else's text — Defacta returns a trust check on claims, citations and risk signals.</span>
        </label>
      </div>

      <!-- Advanced settings (collapsible) -->
      <details class="accordion" style="margin-bottom: var(--space-300)">
        <summary class="accordion__trigger">
          <i data-lucide="settings" class="icon--sm icon--muted"></i>
          <span class="accordion__title">Advanced settings</span>
          <span class="accordion__meta" id="adv-meta">2 of 4 enabled</span>
          <i data-lucide="chevron-down" class="accordion__chevron"></i>
        </summary>
        <div class="accordion__panel">
          <label class="checkbox"><input type="checkbox" class="adv" checked><span class="checkbox__box"></span>
            <span class="checkbox__label"><span class="checkbox__title">Key claim verification</span><span class="checkbox__desc">Identify and verify the highest-impact factual claims.</span></span></label>
          <label class="checkbox"><input type="checkbox" class="adv" checked><span class="checkbox__box"></span>
            <span class="checkbox__label"><span class="checkbox__title">Bias &amp; framing analysis</span><span class="checkbox__desc">Surface loaded language, framing choices, and emphasis patterns.</span></span></label>
          <label class="checkbox"><input type="checkbox" class="adv"><span class="checkbox__box"></span>
            <span class="checkbox__label"><span class="checkbox__title">Deception detection</span><span class="checkbox__desc">Flag stylistic signals of evasion, hedging, or misdirection.</span></span></label>
          <label class="checkbox"><input type="checkbox" class="adv"><span class="checkbox__box"></span>
            <span class="checkbox__label"><span class="checkbox__title">Manipulation check</span><span class="checkbox__desc">Detect persuasive techniques and emotionally coercive language.</span></span></label>
        </div>
      </details>

      <!-- Input -->
      <div class="field-head">
        <span class="label">Paste a link or text</span>
        <span class="link-action" id="use-sample"><i data-lucide="file-text" class="icon--sm"></i> Use sample</span>
      </div>
      <textarea class="textarea" id="content" style="min-height: 200px" placeholder="Paste any text, AI output, or a URL (https://…) to verify."></textarea>
      <div class="textarea-foot">
        <span id="charcount">0 characters</span>
        <span>Max. 50,000 characters</span>
      </div>

      <!-- Actions — full-width, stacked -->
      <div class="stack" style="margin-top: var(--space-300)">
        <button class="btn btn--primary" style="width:100%">Run verification <i data-lucide="arrow-right" class="icon--sm"></i></button>
        <button class="btn btn--secondary" id="clear" style="width:100%">Clear</button>
      </div>
    </main>

    <!-- ── Bottom navigation (Verify active) ────────────────────────── -->
    <nav class="bottom-nav" style="position:sticky; bottom:0">
      <button class="bottom-nav__item is-active" onclick="location.href='workbench.html'"><i data-lucide="scan-eye"></i>Verify</button>
      <button class="bottom-nav__item" onclick="location.href='history.html'"><i data-lucide="history"></i>History</button>
      <button class="bottom-nav__item"><i data-lucide="user"></i>Account</button>
    </nav>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    lucide.createIcons();
    // char counter
    const ta = document.getElementById('content');
    const cc = document.getElementById('charcount');
    const sample = `In a recent statement, the World Health Organization announced that global vaccination coverage reached 92% in 2024, marking the highest figure on record. The report cites unpublished internal data showing that childhood mortality has dropped by 47% since 2019, a decline researchers attribute almost entirely to a new mRNA-based malaria vaccine deployed across Sub-Saharan Africa. Independent experts have universally praised the rollout, calling it "the most consequential public health intervention of the decade."`;
    const fmt = n => n.toLocaleString() + (n === 1 ? ' character' : ' characters');
    const sync = () => cc.textContent = fmt(ta.value.length);
    ta.addEventListener('input', sync);
    document.getElementById('use-sample').addEventListener('click', () => { ta.value = sample; sync(); });
    document.getElementById('clear').addEventListener('click', () => { ta.value = ''; sync(); });
    // advanced-settings counter
    const advs = [...document.querySelectorAll('.adv')];
    const meta = document.getElementById('adv-meta');
    const syncAdv = () => meta.textContent = advs.filter(a => a.checked).length + ' of ' + advs.length + ' enabled';
    advs.forEach(a => a.addEventListener('change', syncAdv));
  </script>
</body>
</html>
