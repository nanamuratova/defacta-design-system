<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Defacta — Sign in</title>
  <link rel="stylesheet" href="../../styles.css">
  <style>
    body { background: var(--surface-paper); }
    .container { max-width: none; padding-inline: var(--space-200); }
    .auth { display: flex; flex-direction: column; gap: var(--space-200); padding-block: var(--space-400); }
  </style>
</head>
<body>
  <div style="max-width:430px; margin-inline:auto; min-height:100vh; display:flex; flex-direction:column">

    <!-- Header -->
    <header class="mobile-header">
      <a class="brand" href="landing.html"><img src="../../assets/defacta-logo.svg" alt="Defacta" class="brand__logo"></a>
      <a class="icon-btn" href="landing.html" aria-label="Close"><i data-lucide="x"></i></a>
    </header>

    <main class="container auth" style="flex:1">
      <div>
        <span class="label" style="display:block; margin-bottom: var(--space-050)">Welcome</span>
        <h1 class="h3" id="auth-title">Create new account</h1>
        <p class="text-sm text-secondary" id="auth-sub" style="margin-top: var(--space-050)">Set the record straight.</p>
      </div>

      <button class="btn btn--provider" style="width:100%">
        <svg width="16" height="16" viewBox="0 0 48 48" aria-hidden="true"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.6l6.8-6.8C35.9 2.4 30.3 0 24 0 14.6 0 6.4 5.4 2.5 13.3l7.9 6.1C12.3 13.3 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.1 24.6c0-1.6-.1-3.1-.4-4.6H24v9.1h12.4c-.5 2.9-2.2 5.3-4.6 7l7.1 5.5c4.2-3.9 6.6-9.6 6.6-17z"/><path fill="#FBBC05" d="M10.4 28.6c-.5-1.4-.8-2.9-.8-4.6s.3-3.2.8-4.6l-7.9-6.1C.9 16.5 0 20.1 0 24s.9 7.5 2.5 10.7l7.9-6.1z"/><path fill="#34A853" d="M24 48c6.3 0 11.6-2.1 15.5-5.7l-7.1-5.5c-2 1.3-4.6 2.1-8.4 2.1-6.3 0-11.7-3.8-13.6-9.4l-7.9 6.1C6.4 42.6 14.6 48 24 48z"/></svg>
        Continue with Google
      </button>

      <div class="divider-label">Or</div>

      <div class="field">
        <label class="label" for="email">Email</label>
        <input class="input" id="email" type="email" placeholder="you@company.com">
      </div>
      <div class="field">
        <div class="field-head" style="margin-bottom:0"><label class="label" for="pw">Password</label><a class="link-action" href="forgot-password.html" style="font-size:var(--text-sm)">Forgot password?</a></div>
        <div class="input-affix">
          <input class="input" id="pw" type="password" placeholder="Enter password">
          <button class="affix-btn" id="pw-toggle" aria-label="Show password"><i data-lucide="eye" class="icon--sm"></i></button>
        </div>
      </div>

      <button class="btn btn--primary" id="auth-submit" style="width:100%">Create account</button>

      <p class="text-sm" style="text-align:center; color:var(--text-secondary)">
        <span id="auth-switch-text">Already have an account?</span>
        <a href="#" id="auth-switch" class="btn btn--link">Sign in</a>
      </p>

      <p class="text-sm" style="text-align:center; color:var(--text-muted); margin-top:auto">By continuing you agree to the <a class="link" href="terms.html">Terms</a> and <a class="link" href="privacy.html">Privacy Policy</a>.</p>
    </main>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    lucide.createIcons();
    // password visibility
    const pw = document.getElementById('pw');
    document.getElementById('pw-toggle').addEventListener('click', () => {
      const show = pw.type === 'password';
      pw.type = show ? 'text' : 'password';
      document.getElementById('pw-toggle').innerHTML = `<i data-lucide="${show ? 'eye-off' : 'eye'}" class="icon--sm"></i>`;
      lucide.createIcons();
    });
    // create-account / sign-in mode — driven by ?mode=signin|signup
    let creating = new URLSearchParams(location.search).get('mode') !== 'signin';
    function applyMode() {
      document.getElementById('auth-title').textContent = creating ? 'Create new account' : 'Welcome back';
      document.getElementById('auth-sub').textContent   = creating ? 'Set the record straight.' : 'Sign in to continue verifying.';
      document.getElementById('auth-submit').textContent = creating ? 'Create account' : 'Sign in';
      document.getElementById('auth-switch-text').textContent = creating ? 'Already have an account?' : 'New to Defacta?';
      document.getElementById('auth-switch').textContent = creating ? 'Sign in' : 'Create account';
    }
    applyMode();
    document.getElementById('auth-switch').addEventListener('click', (e) => { e.preventDefault(); creating = !creating; applyMode(); });
    // submit / Google → console
    document.getElementById('auth-submit').addEventListener('click', () => { location.href = 'workbench.html'; });
    document.querySelector('.btn--provider').addEventListener('click', () => { location.href = 'workbench.html'; });
  </script>
</body>
</html>
