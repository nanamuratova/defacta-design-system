<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Defacta — Set a new password</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <!-- Dimmed marketing backdrop -->
  <header class="site-header">
    <a class="brand" href="landing.html">
      <img src="../assets/defacta-logo.svg" alt="Defacta" class="brand__logo">
    </a>
    <div class="cluster">
      <a class="btn btn--ghost btn--sm" href="auth.html?mode=signin">Sign in</a>
      <a class="btn btn--secondary btn--sm" href="auth.html?mode=signup">Sign up</a>
    </div>
  </header>
  <main class="section" style="text-align:center">
    <div class="container content">
      <h1 class="display" style="opacity:.5">A verification layer<br>for <em>high-risk</em> information.</h1>
    </div>
  </main>

  <!-- ── Set-new-password modal ─────────────────────────────────────── -->
  <div class="modal" data-open>
    <div class="modal__dialog modal__dialog--md">
      <div class="modal__header" style="align-items:center; padding-bottom: var(--space-100)">
        <span class="brand"><img src="../assets/defacta-logo.svg" alt="Defacta" class="brand__logo"></span>
        <button class="modal__close" aria-label="Close"><i data-lucide="x"></i></button>
      </div>

      <!-- State 1 — set new password -->
      <div class="modal__body" id="state-set">
        <h3 class="h4" style="color:var(--text-primary)">Set a new password</h3>
        <p style="margin: var(--space-050) 0 var(--space-300)">Choose a strong password you don't use elsewhere.</p>
        <div class="stack" style="gap: var(--space-200)">
          <div class="field">
            <label class="label" for="pw">New password</label>
            <div class="input-affix">
              <input class="input" id="pw" type="password" placeholder="At least 8 characters">
              <button class="affix-btn" id="pw-toggle" aria-label="Show password"><i data-lucide="eye" class="icon--sm"></i></button>
            </div>
          </div>
          <div class="field">
            <label class="label" for="pw2">Confirm password</label>
            <input class="input" id="pw2" type="password" placeholder="Re-enter password">
          </div>
          <button class="btn btn--primary" id="reset" style="width:100%">Reset password</button>
        </div>
      </div>

      <!-- State 2 — success -->
      <div class="modal__body" id="state-done" hidden style="text-align:center">
        <span class="status-medallion status-medallion--success"><i data-lucide="check"></i></span>
        <h3 class="h4" style="color:var(--text-primary)">Password updated</h3>
        <p style="margin-top: var(--space-100)">You can now sign in with your new password.</p>
        <div style="margin-top: var(--space-300)">
          <a class="btn btn--primary" href="auth.html?mode=signin" style="width:100%">Sign in</a>
        </div>
      </div>

      <div class="modal__footer" style="border-top:0; padding-top:0; justify-content:center">
        <p class="text-sm" style="color:var(--text-muted)">Need help? <a class="link" href="mailto:support@defacta.pro">support@defacta.pro</a></p>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    lucide.createIcons();
    // password visibility
    const pw = document.getElementById('pw');
    document.getElementById('pw-toggle').addEventListener('click', () => {
      const show = pw.type === 'password';
      pw.type = show ? 'text' : 'password';
      document.getElementById('pw-toggle').innerHTML = `<i data-lucide="${show ? 'eye-off' : 'eye'}" class="icon--sm"></i>`;
      lucide.createIcons();
    });
    // submit → success state
    document.getElementById('reset').addEventListener('click', () => {
      document.getElementById('state-set').hidden = true;
      document.getElementById('state-done').hidden = false;
      lucide.createIcons();
    });
    // close → back to sign in
    function closeModal() { location.href = 'auth.html?mode=signin'; }
    document.querySelector('.modal__close').addEventListener('click', closeModal);
    document.querySelector('.modal').addEventListener('click', (e) => { if (e.target.classList.contains('modal')) closeModal(); });
  </script>
</body>
</html>
