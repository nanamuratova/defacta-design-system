<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Defacta — Sign in</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <!-- Dimmed marketing backdrop -->
  <header class="site-header">
    <a class="brand" href="#">
      <svg class="brand__mark" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 1l11 11-11 11L1 12 12 1z"/><path d="M9 8l6 4-6 4V8z" fill="#fff"/>
      </svg>
      <span class="brand__word">defacta</span>
    </a>
    <div class="cluster">
      <button class="btn btn--secondary btn--sm">Book a demo</button>
      <button class="btn btn--primary btn--sm">Try free</button>
    </div>
  </header>
  <main class="section" style="text-align:center">
    <div class="container content">
      <h1 class="display" style="opacity:.5">A verification layer<br>for <em>high-risk</em> information.</h1>
    </div>
  </main>

  <!-- ── Auth modal ─────────────────────────────────────────────────── -->
  <div class="modal" data-open>
    <div class="modal__dialog modal__dialog--md">
      <div class="modal__header" style="align-items:center; padding-bottom: var(--space-8)">
        <span class="brand">
          <svg class="brand__mark" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 1l11 11-11 11L1 12 12 1z"/><path d="M9 8l6 4-6 4V8z" fill="#fff"/>
          </svg>
          <span class="brand__word">defacta</span>
        </span>
        <button class="modal__close" aria-label="Close"><i data-lucide="x"></i></button>
      </div>
      <div class="modal__body">
        <span class="label" style="display:block; margin-bottom: var(--space-4)">Welcome</span>
        <h3 class="h2" id="auth-title" style="color:var(--text-primary)">Create new account</h3>
        <p id="auth-sub" style="margin: var(--space-4) 0 var(--space-24)">Set the record straight.</p>

        <button class="btn btn--provider">
          <svg width="16" height="16" viewBox="0 0 48 48" aria-hidden="true"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.6l6.8-6.8C35.9 2.4 30.3 0 24 0 14.6 0 6.4 5.4 2.5 13.3l7.9 6.1C12.3 13.3 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.1 24.6c0-1.6-.1-3.1-.4-4.6H24v9.1h12.4c-.5 2.9-2.2 5.3-4.6 7l7.1 5.5c4.2-3.9 6.6-9.6 6.6-17z"/><path fill="#FBBC05" d="M10.4 28.6c-.5-1.4-.8-2.9-.8-4.6s.3-3.2.8-4.6l-7.9-6.1C.9 16.5 0 20.1 0 24s.9 7.5 2.5 10.7l7.9-6.1z"/><path fill="#34A853" d="M24 48c6.3 0 11.6-2.1 15.5-5.7l-7.1-5.5c-2 1.3-4.6 2.1-8.4 2.1-6.3 0-11.7-3.8-13.6-9.4l-7.9 6.1C6.4 42.6 14.6 48 24 48z"/></svg>
          Continue with Google
        </button>

        <div class="divider-label" style="margin: var(--space-16) 0">Or</div>

        <div class="stack" style="gap: var(--space-16)">
          <div class="field">
            <label class="label" for="email">Email</label>
            <input class="input" id="email" type="email" placeholder="you@company.com">
          </div>
          <div class="field">
            <div class="field-head"><label class="label" for="pw">Password</label><a class="link-action" href="#" style="font-size:var(--text-sm)">Forgot password?</a></div>
            <div class="input-affix">
              <input class="input" id="pw" type="password" placeholder="Enter password">
              <button class="affix-btn" id="pw-toggle" aria-label="Show password"><i data-lucide="eye" class="icon--sm"></i></button>
            </div>
          </div>
          <button class="btn btn--primary" id="auth-submit" style="width:100%">Create account</button>
          <p class="text-sm" style="text-align:center; color:var(--text-secondary)">
            <span id="auth-switch-text">Already have an account?</span>
            <a href="#" id="auth-switch" style="color:var(--text-primary); font-weight:var(--weight-medium)">Sign in</a>
          </p>
        </div>
      </div>
      <div class="modal__footer" style="border-top:0; padding-top:0; justify-content:center">
        <p class="text-sm" style="color:var(--text-muted)">By continuing you agree to the <a class="link" href="#">Terms</a> and <a class="link" href="#">Privacy Policy</a>.</p>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    lucide.createIcons();
    // password visibility
    const pw = document.getElementById('pw');
    document.getElementById('pw-toggle').addEventListener('click', () => {
      const show = pw.type === 'password';
      pw.type = show ? 'text' : 'password';
      document.getElementById('pw-toggle').innerHTML = `<i data-lucide="${show ? 'eye-off' : 'eye'}" class="icon--sm"></i>`;
      lucide.createIcons();
    });
    // toggle create-account / sign-in
    let creating = true;
    document.getElementById('auth-switch').addEventListener('click', (e) => {
      e.preventDefault();
      creating = !creating;
      document.getElementById('auth-title').textContent = creating ? 'Create new account' : 'Welcome back';
      document.getElementById('auth-sub').textContent   = creating ? 'Set the record straight.' : 'Sign in to continue verifying.';
      document.getElementById('auth-submit').textContent = creating ? 'Create account' : 'Sign in';
      document.getElementById('auth-switch-text').textContent = creating ? 'Already have an account?' : 'New to Defacta?';
      document.getElementById('auth-switch').textContent = creating ? 'Sign in' : 'Create account';
    });
  </script>
</body>
</html>
