<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Defacta — Confirmed</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="landing.html">
      <img src="../assets/defacta-logo.svg" alt="Defacta" class="brand__logo">
    </a>
    <div class="cluster">
      <a class="btn btn--ghost" href="auth.html?mode=signin">Sign in</a>
      <a class="btn btn--secondary" href="auth.html?mode=signup">Sign up</a>
    </div>
  </header>
  <main class="section" style="text-align:center">
    <div class="container content">
      <h1 class="display" style="opacity:.5">A verification layer<br>for <em>high-risk</em> information.</h1>
    </div>
  </main>

  <!-- ── Confirmation modal (small, centered) ───────────────────────── -->
  <div class="modal" data-open>
    <div class="modal__dialog modal__dialog--sm modal__dialog--center">
      <div class="modal__header" style="padding-bottom:0; justify-content:flex-end">
        <button class="modal__close" aria-label="Close"><i data-lucide="x"></i></button>
      </div>
      <div class="modal__body">
        <span class="status-medallion status-medallion--success"><i data-lucide="check"></i></span>
        <h3 class="h4" style="color:var(--text-primary)">You are all set!</h3>
        <p style="margin-top: var(--space-100)">We'll send a confirmation email with your meeting details.</p>
      </div>
      <div class="modal__footer">
        <button class="btn btn--primary">Got it</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    lucide.createIcons();
    // close (X / Got it / backdrop) → back to the landing page
    function closeModal() { location.href = 'landing.html'; }
    document.querySelector('.modal__close').addEventListener('click', closeModal);
    document.querySelector('.modal__footer .btn--primary').addEventListener('click', closeModal);
    document.querySelector('.modal').addEventListener('click', (e) => { if (e.target.classList.contains('modal')) closeModal(); });
  </script>
</body>
</html>
